<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Agentic Linux WSL Kit Architecture</title>
  <desc id="desc">Architecture diagram showing human or LLM operator selecting three safe-by-default skills backed by shared scripts and validation evidence.</desc>
  <defs>
    <style>
      .title{font:700 36px system-ui,Segoe UI,sans-serif;fill:#0f172a}.sub{font:500 18px system-ui,Segoe UI,sans-serif;fill:#475569}.box{fill:#f8fafc;stroke:#2563eb;stroke-width:2;rx:16}.skill{stroke-width:2;rx:16}.green{fill:#f0fdf4;stroke:#16a34a}.amber{fill:#fffbeb;stroke:#d97706}.purple{fill:#faf5ff;stroke:#7c3aed}.cyan{fill:#ecfeff;stroke:#0891b2}.guard{fill:#fff;stroke-width:2;stroke-dasharray:8 6;rx:14}.txt{font:600 18px system-ui,Segoe UI,sans-serif;fill:#111827}.small{font:400 14px system-ui,Segoe UI,sans-serif;fill:#334155}.tiny{font:400 12px system-ui,Segoe UI,sans-serif;fill:#475569}.arrow{stroke:#2563eb;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/></marker>
  </defs>
  <rect width="1200" height="680" fill="#ffffff"/>
  <text x="600" y="52" text-anchor="middle" class="title">Agentic Linux WSL Kit</text>
  <text x="600" y="82" text-anchor="middle" class="sub">safe-by-default skills for diagnostics, updates, and WSL migration</text>

  <rect x="350" y="110" width="500" height="76" class="box"/>
  <text x="600" y="142" text-anchor="middle" class="txt">LLM / Human Operator</text>
  <text x="600" y="166" text-anchor="middle" class="small">intent, goals, constraints, explicit approvals</text>

  <path d="M600 186 V225" class="arrow"/><path d="M600 222 H330 V260" class="arrow"/><path d="M600 222 H600 V260" class="arrow"/><path d="M600 222 H870 V260" class="arrow"/>

  <rect x="190" y="260" width="280" height="138" class="skill green"/>
  <text x="330" y="296" text-anchor="middle" class="txt">linux-doctor</text>
  <text x="330" y="322" text-anchor="middle" class="small">read-only diagnostics</text>
  <text x="330" y="350" text-anchor="middle" class="tiny">OS, WSL, systemd, PATH, tools,</text>
  <text x="330" y="370" text-anchor="middle" class="tiny">Docker, package health, metadata only</text>

  <rect x="510" y="260" width="280" height="138" class="skill amber"/>
  <text x="650" y="296" text-anchor="middle" class="txt">package-security-update</text>
  <text x="650" y="322" text-anchor="middle" class="small">preview then apply</text>
  <text x="650" y="350" text-anchor="middle" class="tiny">apt health, update preview, security</text>
  <text x="650" y="370" text-anchor="middle" class="tiny">timers, optional language tools</text>

  <rect x="830" y="260" width="280" height="138" class="skill purple"/>
  <text x="970" y="296" text-anchor="middle" class="txt">wsl-version-migration</text>
  <text x="970" y="322" text-anchor="middle" class="small">rollback-safe migration</text>
  <text x="970" y="350" text-anchor="middle" class="tiny">inventory, export, install, migrate,</text>
  <text x="970" y="370" text-anchor="middle" class="tiny">validate, cut over, manual retire</text>

  <path d="M330 398 V438" class="arrow"/><path d="M650 398 V438" class="arrow"/><path d="M970 398 V438" class="arrow"/>
  <rect x="190" y="438" width="920" height="90" class="box"/>
  <text x="650" y="468" text-anchor="middle" class="txt">Scripts: shared execution layer</text>
  <text x="470" y="502" text-anchor="middle" class="small">Bash: Linux/WSL checks and updates</text>
  <text x="830" y="502" text-anchor="middle" class="small">PowerShell: Windows-side WSL operations</text>

  <path d="M650 528 V568" class="arrow"/>
  <rect x="250" y="568" width="800" height="74" class="skill cyan"/>
  <text x="650" y="598" text-anchor="middle" class="txt">Evidence + Validation</text>
  <text x="650" y="622" text-anchor="middle" class="small">sanitized logs • before/after plans • validation checks • artifacts</text>

  <text x="96" y="132" class="txt">Safety guardrails</text>
  <rect x="40" y="158" width="240" height="70" class="guard green"/><text x="160" y="188" text-anchor="middle" class="small">No secret contents</text><text x="160" y="210" text-anchor="middle" class="tiny">metadata only</text>
  <rect x="40" y="246" width="240" height="70" class="guard amber"/><text x="160" y="276" text-anchor="middle" class="small">Preview by default</text><text x="160" y="298" text-anchor="middle" class="tiny">show before apply</text>
  <rect x="40" y="334" width="240" height="70" class="guard purple"/><text x="160" y="364" text-anchor="middle" class="small">Rollback before cutover</text><text x="160" y="386" text-anchor="middle" class="tiny">export before migration</text>
  <rect x="40" y="422" width="240" height="70" class="guard" style="stroke:#dc2626"/><text x="160" y="452" text-anchor="middle" class="small">Human approval</text><text x="160" y="474" text-anchor="middle" class="tiny">for destructive steps</text>
</svg>
